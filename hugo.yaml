baseURL: https://apoorvakashyap.github.io/
languageCode: en-us
title: "Apoorva Kashyap | Portfolio"
theme: hugo-profile

# Multilingual configuration
defaultContentLanguage: "en"
defaultContentLanguageInSubdir: false

languages:
  en:
    languageName: "English"
    weight: 1
    contentDir: "content"
    menu:
      main:
        - identifier: papers
          name: Publications
          title: Publications
          url: /#papers
          weight: 0
        - identifier: blog
          name: Blog
          title: Blog posts
          url: https://apoorvakashyap.github.io/musings
          weight: 1
        
outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"

caches:
  images:
    dir: :cacheDir/images

enableRobotsTXT: true

pagination:
  pagerSize: 3

markup:
  goldmark:
    renderer:
      unsafe: true

params:
  title: "Apoorva Kashyap"
  description: My Professional Portfolio Website
  favicon: "/favicon.png"

  useBootstrapCDN: true

  mathjax: false

  animate: true

  customCSS: true

  # theme:
    # disableThemeToggle: true
    # defaultTheme: "light" # dark

  font:
    fontSize: 1rem
    fontWeight: 400
    lineHeight: 1.5
    textAlign: left

  navbar:
    align: ms-auto
    # brandLogo: "/logo.png"
    # showBrandLogo: false # Show brand logo in nav bar | default is true
    brandName: "Apoorva Kashyap" # Brand name for the brand | default is the title variable
    disableSearch: true
    # searchPlaceholder: "Search"
    stickyNavBar:
      enable : true
      showOnScrollUp : true
    enableSeparator: true
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: false
      disableProjects: false
      disableAchievements: false
      disableContact: false

  # Hero
  hero:
    enable: true
    intro: "Hi, my name is"
    title: "Apoorva Kashyap."
    subtitle: "I build systems that scale"
    content: "A systems and networking enthusiast with experience in low-level protocol design, cloud-native data pipelines, and geospatial data engineering. I work with C++, Python, and modern infrastructure to build performant, reliable software."
    image: /images/me.png
    bottomImage:
      enable: true
    roundImage: true # Make hero image circular | default false
    button:
      enable: true
      name: "Resume"
      url: "docs/ApoorvaKashyap-Resume.pdf"
      download: true
      newPage: false
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: https://github.com/ApoorvaKashyap
        - icon: fab fa-linkedin
          url: https://linkedin.com/in/apoorvakashyap54

  # About
  about:
    enable: true
    title: "About Me"
    # image: "/images/me.png"
    content: |-
      I am a systems-oriented software developer with a background in transportation technology and computer applications. I currently work at the Indian Institute of Technology, Delhi, where I architect columnar storage systems for satellite imagery and LiDAR datasets.

      Previously, I designed custom Layer-4 network protocols for underwater acoustic communication using C++17 and Linux raw sockets. I enjoy working at the intersection of systems programming, networking, and data engineering.
    skills:
      enable: true
      title: "Here are a few technologies I've been working with recently:"
      items:
        - "C++ (14/17)"
        - "Python"
        - "Docker & Kubernetes"
        - "PostgreSQL & Redis"
        - "FastAPI & SvelteKit"
        - "Linux & Raw Sockets"

  # Experience
  experience:
    enable: true
    # title: "Custom Name"
    items:
      - company: "ICTD Lab, SIT, IIT Delhi"
        companyUrl: "https://sit.iitd.ac.in/"
        jobs:
          - name: "Research Associate"
            date: "Jan 2026 - Present"
            content: |
              - Architected a columnar storage system for satellite imagery and LiDAR datasets using Zarr & Parquet, reducing storage footprint by 50% through optimised chunking and compression (zstd, GZIP).

      - company: "CARE, IIT Delhi"
        companyUrl: "https://care.iitd.ac.in/"
        jobs:
          - name: "Junior Research Fellow"
            date: "Jul 2024 - Jul 2025"
            content: |
              - Architected a custom Layer-4 network protocol for underwater acoustic modems using C++17 and Linux raw sockets, overcoming severe multipath fading and signal attenuation.
              - Integrated advanced modulation and error correction techniques to improve data integrity and reduce packet loss under variable underwater conditions.
              - Optimised packet serialisation using binary packing structures and reduced header size for bandwidth-constrained channels (<1 kbps).
              - Implemented ECDH with AES-GCM & KeyStore-based encryption (via Botan) to secure underwater data transmission without compromising real-time performance.

      - company: "Numerator India"
        companyUrl: "https://www.numerator.com/"
        jobs:
          - name: "Research Associate"
            date: "Apr 2024 - Jul 2024"
            content: |
              - Designed surveys and analysed survey data (R, Python) & created impactful dashboards.
              - Optimised productivity and reduced admin workload by 20% with a self-developed system.
              - Skilled in data visualisation & presentation.

  # Education
  education:
    enable: true
    # title: "Custom Name"
    index: false
    items:
      - title: "Master of Computer Applications"
        school:
          name: "IGNOU, New Delhi"
          url: "https://www.ignou.ac.in/"
        date: "Graduating Jun 2026"
        content: |-
          Coursework: Artificial Intelligence and Machine Learning, Data Science and Big Data, Data Warehousing and Data Mining, Cloud Computing and IoT, Web Technologies, Object-Oriented Analysis and Design, Data Communication and Computer Networks, Software Engineering
      - title: "Bachelor of Science in Transportation Technology"
        school:
          name: "Gati Shakti Vishwavidyalaya, Vadodara"
          url: "https://gsv.ac.in/"
        date: "Graduated Jun 2022"
        GPA: "8.74 out of 10.00"
        content: |-
          Top 5% of Class

          Coursework: Programming Languages, Linear and Dynamic Programming, Data Analysis and Representation, Mathematical Modelling, Flows in Transportation Networks, Principles of Information Systems, Systems Thinking, Project Management, Essentials of Business Technology

  # Achievements
  achievements:
    enable: false

  # projects
  projects:
    enable: true
    # title: "Custom Name"
    items:
      - title: CineRec
        content: A hybrid ML movie recommendation system using collaborative filtering and content-based filtering, optimised for cold-start scenarios. Full-stack app with FastAPI backend, Redis caching, SvelteKit frontend, and PostgreSQL database.
        image: /images/projects/cinerec.png
        badges:
          - "FastAPI"
          - "SvelteKit"
          - "PostgreSQL"
          - "Redis"
          - "PyTorch"
        links:
          - icon: fab fa-github
            url: "#"

      - title: Batch Event Processor
        content: A scalable Kubernetes-native batch processing system using Python, Argo Workflows, and Kubernetes for event-driven data aggregation. Containerised microservices with PostgreSQL for processing event data in batches.
        image: /images/projects/default.png
        badges:
          - "Python"
          - "Kubernetes"
          - "Argo Workflows"
          - "PostgreSQL"
          - "Docker"
        links:
          - icon: fab fa-github
            url: https://github.com/ApoorvaKashyap/batch-event-processor

      - title: GeoLocations
        content: A Python program that maps the route a network request follows across the internet, visualising the geographic path of packets through traceroute.
        image: /images/projects/default.png
        badges:
          - "Python"
          - "Networking"
          - "Geolocation"
        links:
          - icon: fab fa-github
            url: https://github.com/ApoorvaKashyap/GeoLocations

  #Contact
  contact:
