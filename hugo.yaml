      count: 3
      title: Recent Posts
      enable: false
      disableFeaturedImage: false
    socialNetworks:
      github: https://github.com/ApoorvaKashyap
      linkedin: https://linkedin.com/in/apoorvakashyap54
      gmail: mailto:apoorvakashyap54@gmail.com  

  # List pages like blogs and posts
